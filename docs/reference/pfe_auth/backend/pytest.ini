[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
python_files = test_*.py
addopts = -q
filterwarnings =
	ignore:.*asyncio\.iscoroutinefunction.*:DeprecationWarning:pytest_asyncio\.plugin
	ignore:.*asyncio\.get_event_loop_policy.*:DeprecationWarning:pytest_asyncio\.plugin
	ignore:.*asyncio\.set_event_loop_policy.*:DeprecationWarning:pytest_asyncio\.plugin
	ignore:Please use `import python_multipart` instead\.:PendingDeprecationWarning:starlette\.formparsers
	ignore:datetime\.datetime\.utcnow\(\) is deprecated.*:DeprecationWarning:jose\.jwt
