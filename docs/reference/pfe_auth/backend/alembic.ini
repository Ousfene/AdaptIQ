# Alembic configuration for AdaptIQ backend.
# Run migrations:       alembic upgrade head
# Create new migration: alembic revision --autogenerate -m "describe_change"
# Stamp existing DB:    alembic stamp head   (marks current state as up-to-date without running SQL)

[alembic]
script_location = alembic
prepend_sys_path = .
# URL is overridden at runtime by alembic/env.py from config.py — this line is just a placeholder
sqlalchemy.url = postgresql+asyncpg://placeholder/placeholder

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
